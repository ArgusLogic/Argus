[general]
# 默认模型，支持 litellm 格式：deepseek/deepseek-v4-pro, deepseek/deepseek-v4-flash, gpt-4o, claude-sonnet-4-20250514, ollama/qwen2.5
# 注意: deepseek-chat 将于 2026-07-24 退役，建议使用 v4 系列
default_model = "deepseek/deepseek-v4-flash"
# 危险操作需要用户确认（safe 级工具始终自动执行）
approval_mode = true
# 显示中间推理过程
verbose = true
# 单次工具执行超时（秒）
tool_timeout = 60
# 工具执行失败时最大重试次数
max_retries = 2
# 日志同时写入文件 (output/logs/)
log_to_file = true
# 上下文窗口大小 (tokens)，超过此值的 80% 将触发压缩
# 不要超过所选模型的实际上下文限制：
#   deepseek-v4-flash: 128K  →  context_max_tokens = 128000
#   deepseek-v4-pro:   128K  →  context_max_tokens = 128000
#   gpt-5.4-mini:      400K  →  context_max_tokens = 400000
#   claude-sonnet-4-6: 200K  →  context_max_tokens = 200000
context_max_tokens = 128000

[api_keys]
# 至少填一个。支持 DeepSeek / OpenAI / Anthropic。
deepseek = ""
openai = ""
anthropic = ""

[browser]
# headed = true 会弹出浏览器窗口（调试用）。
# 无桌面环境的服务器请保持 false，否则缺 XServer 会崩溃。
headed = false
# 浏览器超时时间（毫秒）
timeout = 30000

[security]
# 允许扫描的域名白名单。为空则不限制（请确保只扫描授权目标）。
# 示例: allowed_domains = ["example.com", "testsite.local"]
allowed_domains = []
# 截图保存目录
screenshot_dir = "./output/screenshots"
# 报告输出目录
report_dir = "./output/reports"

# ── 工具白名单/黑名单（可选，三种语义）──────────────────────────────────────
# tool_allowlist: 仅允许此列表中的工具被调用（包括 confirm/block 级），其它一律拒绝
#   留空 [] 表示不启用白名单（默认所有已注册工具可用）
# tool_blocklist: 显式禁用某些工具（无论它们的风险等级）
# require_approval_for: 即使 approval_mode=false，这些工具仍强制审批
#
# 优先级：blocklist > allowlist > require_approval > approval_mode
#
# 示例（只允许只读侦察工具）：
# tool_allowlist = ["http_get", "dns_lookup", "whois_lookup", "header_analysis", "browser_navigate", "browser_get_text"]
# tool_blocklist = ["browser_console_exec", "port_scan"]
# require_approval_for = ["delegate_subagents", "subdomain_enum"]
tool_allowlist = []
tool_blocklist = []
require_approval_for = []

# ── 自演化 / Skills ────────────────────────────────────────────────────────
[skills]
# A1: 任务结束后扫描本轮工具调用，与已有技能 step 匹配（≥60% 重合）→ success_count+1
# 零 LLM 调用，零额外成本；默认开启
track_usage = true

# A2: 任务结束后用 LLM 自动判断"值不值得提炼新技能"，命中则写 skills/
# ⚠️ 每次任务结束都会触发一次 LLM 调用（轻量 prompt，~500 tokens）
# 默认关闭；建议在确认效果后再开启
auto_extract = false

# ── 自演化 / Curator (B1+B2) ──────────────────────────────────────────────
[skills.curator]
# B1: 默认关闭。建议通过独立后台进程运行：
#     python -m agent.curator daemon --interval 24h
# 启用此项仅控制下方 update_user_profile 是否在 daemon 中跑（B2）
enabled = false
similarity_threshold = 0.85
archive_after_days = 30
# B2: 用 LLM 分析最近会话归纳用户画像，写入 USER.md
# ⚠️ 每次 daemon 周期会触发一次 LLM 调用
update_user_profile = false

# ── 自演化 / 记忆（A3: 失败学习自动入库）────────────────────────────────────
[memory]
# 启发式扫描本轮 tool 结果，识别失败模式（403/429/WAF/超时/captcha 等）
# 自动写入 LESSONS.md，下次会话首轮注入 system prompt 形成"避坑库"
# 零 LLM 调用；默认开启
track_lessons = true

# C2: 把失败的 tool 调用结构化追加到 ~/.argus/failure_replays.jsonl
# 与 lessons（人类可读避坑文本）互补：本日志可被未来工具/insights 程序化检索
# 默认关闭
track_failure_replays = false
